<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NELION Cockpit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #fafafa;
    --surface:    #ffffff;
    --surface2:   #f0f0f0;
    --ink:        #1a1a1a;
    --ink-mid:    #4a4a4a;
    --ink-dim:    #888888;
    --ink-mute:   #b0b0b0;
    --accent:     #2c2c2c;
    --accent-h:   #444444;
    --border:     rgba(0,0,0,0.08);
    --border2:    rgba(0,0,0,0.15);
    --red:        #c0392b;
    --red-h:      #e74c3c;
    --red-bg:     #fdf2f2;
    --green:      #27ae60;
    --green-bg:   #f0faf4;
    --yellow:     #f39c12;
    --yellow-bg:  #fef9e7;
    --ada-accent: #4B0082;
    --ada-accent-h: #5B2C8D;
    --ada-bg:     #f3eef8;
    --mono:       'DM Mono', monospace;
    --sans:       'DM Sans', sans-serif;
    --r:          10px;
    --rs:         6px;
    --max-w:      900px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ──────────────────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo-mark {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    color: #fff; letter-spacing: 0.05em;
    cursor: pointer; transition: opacity .15s;
  }
  .logo-mark:hover { opacity: 0.8; }
  .logo-text { font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--ink); letter-spacing: 0.08em; }
  .logo-sub { font-size: 11px; color: var(--ink-mute); font-weight: 300; }

  /* ── TAB NAV ─────────────────────────────────────────────────────────── */
  .tab-nav {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    gap: 0;
    flex-shrink: 0;
  }
  .tab-btn {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.05em;
    color: var(--ink-dim);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 10px 20px;
    cursor: pointer;
    transition: all .15s;
  }
  .tab-btn:hover { color: var(--ink); }
  .tab-btn.active { color: var(--ink); font-weight: 500; border-bottom-color: var(--accent); }
  .tab-btn.active[data-tab="ada"] { border-bottom-color: var(--ada-accent); }

  /* ── MAIN ────────────────────────────────────────────────────────────── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 20px 40px;
    overflow-y: auto;
  }
  .container { width: 100%; max-width: var(--max-w); }
  .module { display: none; }
  .module.active { display: block; }

  /* ── SCREENS ─────────────────────────────────────────────────────────── */
  .screen { display: none; }
  .screen.active { display: flex; flex-direction: column; gap: 20px; }

  /* ── START SCREEN ────────────────────────────────────────────────────── */
  .start-title { font-size: 22px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
  .start-desc { font-size: 13px; color: var(--ink-dim); margin-bottom: 8px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-label {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink-dim);
  }
  .form-input {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: var(--r); color: var(--ink); font-family: var(--sans);
    font-size: 15px; padding: 10px 14px; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
  .form-input::placeholder { color: var(--ink-mute); }
  textarea.form-input { resize: vertical; min-height: 60px; line-height: 1.5; }
  select.form-input { cursor: pointer; }

  /* ── BUTTONS ─────────────────────────────────────────────────────────── */
  .btn {
    font-family: var(--sans); font-size: 14px; font-weight: 500;
    border-radius: var(--r); padding: 10px 22px; cursor: pointer;
    border: 1px solid; transition: all .15s; text-align: center;
  }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-h); border-color: var(--accent-h); }
  .btn-primary:disabled { opacity: .35; cursor: not-allowed; }
  .btn-ghost { background: transparent; border-color: var(--border2); color: var(--ink-mid); }
  .btn-ghost:hover { border-color: var(--ink-dim); color: var(--ink); }
  .btn-green { background: var(--ada-accent); border-color: var(--ada-accent); color: #fff; }
  .btn-green:hover { background: var(--ada-accent-h); border-color: var(--ada-accent-h); }
  .btn-red { background: var(--red); border-color: var(--red); color: #fff; }
  .btn-red:hover { background: var(--red-h); border-color: var(--red-h); }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-sm { padding: 6px 14px; font-size: 12px; }

  /* ── CONTACT LIST ────────────────────────────────────────────────────── */
  .contact-list { display: flex; flex-direction: column; gap: 6px; }
  .contact-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .contact-item:hover { border-color: var(--border2); background: var(--surface2); }
  .contact-name { font-weight: 500; font-size: 14px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .contact-date { font-family: var(--mono); font-size: 10px; color: var(--ink-mute); flex-shrink: 0; }
  .contact-name-edit {
    font-family: var(--sans); font-weight: 500; font-size: 14px;
    flex: 1; min-width: 0; background: var(--surface); border: 1px solid var(--accent);
    border-radius: 4px; padding: 2px 6px; outline: none; color: var(--ink);
  }
  .btn-del-contact, .btn-edit-contact {
    flex-shrink: 0; opacity: 0; background: transparent; border: none;
    color: var(--ink-mute); cursor: pointer; padding: 4px 5px; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .15s, color .15s, background .15s;
  }
  .contact-item:hover .btn-del-contact,
  .contact-item:hover .btn-edit-contact { opacity: 1; }
  .btn-del-contact:hover { color: #c0392b; background: rgba(192,57,43,0.1); }
  .btn-edit-contact:hover { color: var(--accent); background: rgba(0,0,0,0.05); }
  .divider {
    display: flex; align-items: center; gap: 12px;
    font-family: var(--mono); font-size: 10px; color: var(--ink-mute);
    letter-spacing: 0.1em; text-transform: uppercase; margin: 8px 0;
  }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }

  /* ── COCKPIT ─────────────────────────────────────────────────────────── */
  .cockpit-contact {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 12px; color: var(--ink-dim);
    letter-spacing: 0.05em; margin-bottom: -4px; flex-wrap: wrap;
  }
  .cockpit-contact-name {
    font-weight: 500; color: var(--ink); cursor: pointer;
    border-bottom: 1px dashed var(--border2); transition: color .15s;
  }
  .cockpit-contact-name:hover { color: var(--accent); }
  .cockpit-contact-name-edit {
    font-family: var(--mono); font-size: 12px; font-weight: 500;
    color: var(--ink); background: var(--surface);
    border: 1px solid var(--accent); border-radius: 4px;
    padding: 2px 6px; outline: none;
  }
  .cockpit-contact-date { color: var(--ink-mute); }
  .notes-label {
    font-family: var(--mono); font-size: 10px; color: var(--ink-mute);
    letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px;
  }
  .phase-header { display: flex; align-items: center; gap: 12px; margin-bottom: -4px; }
  .phase-number {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink-mute); flex-shrink: 0;
  }
  .phase-title { font-size: 20px; font-weight: 600; color: var(--ink); }
  .phase-time {
    font-family: var(--mono); font-size: 10px; color: var(--ink-mute);
    margin-left: auto; flex-shrink: 0;
  }
  .phase-instruction {
    background: var(--surface2); border-left: 3px solid var(--accent);
    border-radius: 0 var(--rs) var(--rs) 0; padding: 12px 16px;
    font-size: 14px; color: var(--ink-mid); line-height: 1.6;
  }
  .guide-block {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 16px;
  }
  .guide-label {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink-mute); margin-bottom: 8px;
  }
  .guide-item {
    padding: 6px 0; font-size: 14px; color: var(--ink-mid); line-height: 1.5;
    border-bottom: 1px solid var(--border);
  }
  .guide-item:last-child { border-bottom: none; }
  .guide-item em { font-style: italic; color: var(--ink); }

  .notes-area {
    width: 100%; background: var(--surface); border: 1px solid var(--border2);
    border-radius: var(--r); font-family: var(--sans); font-size: 14px;
    color: var(--ink); padding: 12px 14px; min-height: 120px;
    resize: vertical; outline: none; line-height: 1.6;
    transition: border-color .15s, box-shadow .15s;
  }
  .notes-area:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,0,0,0.04); }
  .notes-area::placeholder { color: var(--ink-mute); }

  /* ── PHASE SIDEBAR ────────────────────────────────────────────────────── */
  .cockpit-layout { display: flex; gap: 0; width: 100%; max-width: none; }
  .phase-sidebar {
    width: 200px; min-width: 200px; background: var(--surface);
    border-right: 1px solid var(--border); border-radius: var(--r) 0 0 var(--r);
    padding: 16px 0; display: flex; flex-direction: column; gap: 2px; flex-shrink: 0;
  }
  .phase-sidebar-label {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink-mute); padding: 0 16px 8px;
  }
  .phase-nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 16px;
    cursor: pointer; transition: background .12s; border: none;
    background: transparent; width: 100%; text-align: left;
    font-family: var(--sans); font-size: 13px; color: var(--ink-dim);
    border-left: 3px solid transparent;
  }
  .phase-nav-item:hover { background: var(--surface2); }
  .phase-nav-item.active { background: var(--surface2); border-left-color: var(--accent); color: var(--ink); font-weight: 500; }
  .phase-nav-item.done { color: var(--ink-mid); }
  .phase-nav-dot {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--border2); display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; font-family: var(--mono);
    font-size: 10px; font-weight: 500; color: var(--ink-mute); transition: all .2s;
  }
  .phase-nav-item.active .phase-nav-dot { border-color: var(--accent); background: var(--accent); color: #fff; }
  .phase-nav-item.done .phase-nav-dot { border-color: var(--green); background: var(--green); color: #fff; }
  .phase-nav-title { flex: 1; min-width: 0; }
  .cockpit-content { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 20px; padding: 0; }

  /* ── SIGNAL TRACKER ───────────────────────────────────────────────────── */
  .signal-tracker {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 2px;
  }
  .signal-tracker-label {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink-mute); margin-right: 4px;
  }
  .signal-btn {
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    padding: 4px 10px; border-radius: 14px; cursor: pointer;
    border: 1px solid var(--border2); background: var(--surface);
    color: var(--ink-dim); transition: all .15s; position: relative;
  }
  .signal-btn:hover { border-color: var(--accent); color: var(--ink); }
  .signal-btn:active { transform: scale(0.95); }
  .signal-btn .signal-count {
    display: inline-block; min-width: 14px; height: 14px;
    border-radius: 7px; background: var(--accent); color: #fff;
    font-size: 9px; text-align: center; line-height: 14px;
    margin-left: 4px; padding: 0 3px;
  }
  .signal-btn .signal-count.zero { background: transparent; color: var(--ink-mute); }
  .signal-btn.l1-active { border-color: #8e44ad; color: #8e44ad; background: #f5eef8; }
  .signal-btn.l2-active { border-color: #2980b9; color: #2980b9; background: #eaf2f8; }
  .signal-btn.l3-active { border-color: #e67e22; color: #e67e22; background: #fef5e7; }

  .signal-summary {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 16px; margin-top: 4px;
  }
  .signal-summary-title {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink-mute); margin-bottom: 10px;
  }
  .signal-summary-row {
    display: flex; align-items: center; gap: 10px; padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .signal-summary-row:last-child { border-bottom: none; }
  .signal-summary-layer {
    font-family: var(--mono); font-size: 12px; font-weight: 500; width: 28px;
  }
  .signal-summary-layer.l1 { color: #8e44ad; }
  .signal-summary-layer.l2 { color: #2980b9; }
  .signal-summary-layer.l3 { color: #e67e22; }
  .signal-summary-bar {
    flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden;
  }
  .signal-summary-fill { height: 100%; border-radius: 4px; transition: width .3s; }
  .signal-summary-fill.l1 { background: #8e44ad; }
  .signal-summary-fill.l2 { background: #2980b9; }
  .signal-summary-fill.l3 { background: #e67e22; }
  .signal-summary-num {
    font-family: var(--mono); font-size: 12px; color: var(--ink-mid); width: 20px; text-align: right;
  }

  /* ── ANKER ───────────────────────────────────────────────────────────── */
  .btn-anker {
    position: fixed; bottom: 24px; right: 24px; width: 52px; height: 52px;
    border-radius: 50%; background: var(--red); border: none; color: #fff;
    font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 0.05em;
    cursor: pointer; box-shadow: 0 4px 20px rgba(192,57,43,0.3);
    transition: background .15s, transform .15s, box-shadow .15s;
    display: none; z-index: 90;
  }
  .btn-anker:hover { background: var(--red-h); transform: scale(1.06); box-shadow: 0 6px 28px rgba(192,57,43,0.4); }
  .anker-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  .anker-overlay.open { opacity: 1; pointer-events: all; }
  .anker-card {
    background: #fff; border-radius: 14px; padding: 36px 32px; max-width: 480px;
    width: 100%; text-align: center; box-shadow: 0 24px 80px rgba(0,0,0,0.15);
    display: flex; flex-direction: column; gap: 20px;
  }
  .anker-line { font-size: 16px; font-weight: 500; line-height: 1.6; color: var(--ink); padding: 12px 0; border-bottom: 1px solid var(--border); }
  .anker-line:last-of-type { border-bottom: none; }
  .anker-line.italic { font-style: italic; color: var(--ink-mid); }
  .anker-close {
    background: var(--accent); border: none; color: #fff; border-radius: var(--r);
    padding: 10px 28px; font-family: var(--sans); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: background .15s; align-self: center;
  }
  .anker-close:hover { background: var(--accent-h); }

  /* ── COMPLETE SCREEN ─────────────────────────────────────────────────── */
  .complete-icon { font-size: 48px; text-align: center; margin-bottom: -8px; }
  .complete-title { font-size: 20px; font-weight: 600; text-align: center; }
  .complete-msg { font-size: 14px; color: var(--ink-dim); text-align: center; line-height: 1.6; }

  /* ── FRICTION SCAN SPECIFIC ──────────────────────────────────────────── */
  .scan-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 20px;
  }
  .scan-card-title {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink-mute); margin-bottom: 12px;
  }
  .check-row {
    display: flex; align-items: center; gap: 10px; padding: 8px 0;
    border-bottom: 1px solid var(--border); font-size: 14px;
  }
  .check-row:last-child { border-bottom: none; }
  .check-row input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--green); }
  .gate-result {
    padding: 14px 18px; border-radius: var(--r); font-size: 14px; font-weight: 500;
    margin-top: 12px; text-align: center;
  }
  .gate-ok { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
  .gate-fail { background: var(--red-bg); color: var(--red); border: 1px solid var(--red); }

  /* ── AMPEL (Traffic Light) ──────────────────────────────────────────── */
  .ampel-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .ampel-row {
    display: flex; align-items: center; gap: 8px; padding: 6px 10px;
    background: var(--surface2); border-radius: var(--rs);
  }
  .ampel-label { flex: 1; font-size: 12px; color: var(--ink-mid); }
  .ampel-dots { display: flex; gap: 4px; }
  .ampel-dot {
    width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border2);
    cursor: pointer; transition: all .15s;
  }
  .ampel-dot.gruen { background: var(--green); border-color: var(--green); }
  .ampel-dot.gelb { background: var(--yellow); border-color: var(--yellow); }
  .ampel-dot.rot { background: var(--red); border-color: var(--red); }
  .ampel-dot:hover { transform: scale(1.15); }
  .layer-label {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink-dim); margin: 12px 0 6px; grid-column: 1 / -1;
  }

  /* ── INTERVIEW CARD ─────────────────────────────────────────────────── */
  .interview-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 20px; margin-bottom: 12px;
  }
  .interview-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .interview-num {
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    background: var(--accent); color: #fff; width: 26px; height: 26px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
  }
  .interview-title { font-weight: 500; font-size: 15px; }
  .interview-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .kernfrage {
    padding: 10px 14px; background: var(--surface2);
    border-left: 3px solid var(--accent); border-radius: 0 var(--rs) var(--rs) 0;
    font-size: 13px; color: var(--ink-mid); line-height: 1.5; margin-bottom: 6px;
  }
  .kernfrage-num { font-family: var(--mono); font-size: 10px; color: var(--ink-mute); }

  /* ── DENZIN TABLE ───────────────────────────────────────────────────── */
  .denzin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .denzin-table th {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink-mute); padding: 8px 10px;
    text-align: left; border-bottom: 2px solid var(--border2);
  }
  .denzin-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
  .star-select {
    display: flex; gap: 2px; cursor: pointer;
  }
  .star-select span { font-size: 16px; color: var(--ink-mute); transition: color .1s; }
  .star-select span.filled { color: var(--yellow); }

  /* ── HYPOTHESE CARD ─────────────────────────────────────────────────── */
  .hyp-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 16px; margin-bottom: 10px;
  }
  .hyp-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ── REGIME BADGE ───────────────────────────────────────────────────── */
  .regime-badge {
    display: inline-block; padding: 6px 16px; border-radius: 20px;
    font-family: var(--mono); font-size: 13px; font-weight: 500;
    background: var(--surface2); color: var(--ink-mid); border: 1px solid var(--border2);
  }

  /* ── ADA CHAT ───────────────────────────────────────────────────────── */
  .ada-container {
    display: flex; flex-direction: column; height: calc(100dvh - 140px);
    max-width: var(--max-w); width: 100%;
  }
  .ada-context-bar {
    background: var(--ada-bg); border: 1px solid rgba(75,0,130,0.2);
    border-radius: var(--r); padding: 10px 16px; margin-bottom: 12px;
    font-family: var(--mono); font-size: 11px; color: var(--ada-accent);
    display: flex; align-items: center; gap: 8px;
  }
  .ada-messages {
    flex: 1; overflow-y: auto; display: flex; flex-direction: column;
    gap: 12px; padding: 8px 0; min-height: 0;
  }
  .ada-msg {
    padding: 12px 16px; border-radius: var(--r); font-size: 14px;
    line-height: 1.6; max-width: 85%; white-space: pre-wrap;
  }
  .ada-msg.user {
    background: var(--surface2); color: var(--ink); align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .ada-msg.assistant {
    background: var(--ada-bg); color: var(--ink); align-self: flex-start;
    border-bottom-left-radius: 4px; border: 1px solid rgba(75,0,130,0.15);
  }
  .ada-msg.thinking {
    background: var(--ada-bg); color: var(--ada-accent); align-self: flex-start;
    font-style: italic; opacity: 0.7;
  }
  .ada-input-row {
    display: flex; gap: 8px; padding-top: 12px; border-top: 1px solid var(--border);
  }
  .ada-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border2);
    border-radius: var(--r); font-family: var(--sans); font-size: 14px;
    color: var(--ink); padding: 10px 14px; outline: none; resize: none;
    min-height: 44px; max-height: 120px;
    transition: border-color .15s;
  }
  .ada-input:focus { border-color: var(--ada-accent); }
  .ada-input::placeholder { color: var(--ink-mute); }
  .ada-send {
    background: var(--ada-accent); border: none; color: #fff;
    border-radius: var(--r); padding: 10px 18px; font-family: var(--sans);
    font-size: 14px; font-weight: 500; cursor: pointer;
    transition: background .15s; align-self: flex-end;
  }
  .ada-send:hover { background: var(--ada-accent-h); }
  .ada-send:disabled { opacity: .4; cursor: not-allowed; }

  /* ── PLAN B PANEL ───────────────────────────────────────────────────── */
  .plan-b-panel {
    display: none; background: var(--red-bg); border: 1px solid var(--red);
    border-radius: var(--r); padding: 16px; margin-top: 10px;
  }
  .plan-b-panel.open { display: block; }
  .plan-b-title {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--red); margin-bottom: 10px;
  }

  /* ── RESPONSIVE ──────────────────────────────────────────────────────── */
  @media (max-width: 768px) {
    .cockpit-layout { flex-direction: column; }
    .phase-sidebar {
      width: 100%; min-width: 0; flex-direction: row; border-right: none;
      border-bottom: 1px solid var(--border); border-radius: var(--r) var(--r) 0 0;
      padding: 8px 8px; gap: 0; overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .phase-sidebar::-webkit-scrollbar { display: none; }
    .phase-sidebar-label { display: none; }
    .phase-nav-item {
      flex-direction: column; gap: 4px; padding: 8px 12px;
      border-left: none; border-bottom: 3px solid transparent;
      min-width: 0; flex-shrink: 0; font-size: 10px; text-align: center;
    }
    .phase-nav-item.active { border-bottom-color: var(--accent); border-left-color: transparent; }
    .phase-nav-dot { width: 20px; height: 20px; font-size: 9px; }
    .phase-nav-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60px; }
    .ampel-grid { grid-template-columns: 1fr; }
    .interview-fields { grid-template-columns: 1fr; }
    .hyp-fields { grid-template-columns: 1fr; }
    .tab-nav { padding: 0 12px; }
    .tab-btn { padding: 8px 12px; font-size: 11px; }
  }
  @media (max-width: 600px) {
    header { padding: 0 16px; height: 50px; }
    .logo-sub { display: none; }
    .main { padding: 16px 14px 32px; }
    .phase-title { font-size: 18px; }
    .anker-card { padding: 28px 20px; }
    .btn-anker { bottom: 16px; right: 16px; width: 46px; height: 46px; font-size: 10px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-mark">N</div>
    <div class="logo-text">NELION</div>
    <span class="logo-sub" id="logoSub">Cockpit</span>
  </div>
</header>

<!-- ── TAB NAVIGATION ──────────────────────────────────────────────────── -->
<nav class="tab-nav">
  <button class="tab-btn active" data-tab="modul1" onclick="switchTab('modul1')">Erstgespräch</button>
  <button class="tab-btn" data-tab="modul2" onclick="switchTab('modul2')">Friction Scan</button>
  <button class="tab-btn" data-tab="ada" onclick="switchTab('ada')">ADA</button>
</nav>

<div class="main">
<div class="container">

<!-- ╔═══════════════════════════════════════════════════════════════════════╗ -->
<!-- ║  MODUL 1 — ERSTGESPRÄCH                                             ║ -->
<!-- ╚═══════════════════════════════════════════════════════════════════════╝ -->
<div class="module active" id="moduleModul1">

<div class="screen active" id="screenStart">
  <div class="start-title">Erstgespräch starten</div>
  <div class="start-desc">Kontakt anlegen oder bestehenden wählen.</div>
  <div class="form-group">
    <label class="form-label" for="contactName">Name *</label>
    <input class="form-input" type="text" id="contactName" placeholder="Vorname Nachname" autocomplete="off">
  </div>
  <div class="form-group">
    <label class="form-label" for="contactDate">Datum</label>
    <input class="form-input" type="date" id="contactDate">
  </div>
  <div class="form-group">
    <label class="form-label" for="contactNote">Notiz (optional)</label>
    <textarea class="form-input" id="contactNote" placeholder="Kontext, Quelle, erster Eindruck…" rows="2"></textarea>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" id="btnStartSession">Gespräch starten</button>

  <div class="divider">Bestehende Kontakte</div>
  <div class="contact-list" id="contactList">

<div class="screen" id="screenCockpit">

  <div class="cockpit-layout">
    <nav class="phase-sidebar" id="phaseSidebar">
      <div class="phase-sidebar-label">Phasen</div>
    </nav>
    <div class="cockpit-content">
      <div id="phaseContent"></div>
      <div class="notes-label" id="notesLabel"></div>
      <textarea class="notes-area" id="phaseNotes" placeholder="Notizen zu dieser Phase…"></textarea>
      <div class="btn-row" id="phaseButtons"></div>
    </div>
  </div>
</div>

<div class="screen" id="screenComplete">
  <div class="complete-icon">&#10003;</div>
  <div class="complete-title">Erstgespräch abgeschlossen</div>
  <div class="complete-msg" id="completeMsg"></div>
  <div class="btn-row" style="justify-content:center;">
    <button class="btn btn-primary" id="btnBackToStart">Neues Gespräch</button>
  </div>
</div>

</div><!-- /moduleModul1 -->

<!-- ╔═══════════════════════════════════════════════════════════════════════╗ -->
<!-- ║  MODUL 2 — FRICTION SCAN                                            ║ -->
<!-- ╚═══════════════════════════════════════════════════════════════════════╝ -->

  <div id="scanContent"></div>
</div>

<!-- ╔═══════════════════════════════════════════════════════════════════════╗ -->
<!-- ║  ADA — AI ASSISTANT                                                 ║ -->
<!-- ╚═══════════════════════════════════════════════════════════════════════╝ -->
<div class="module" id="moduleAda">
  <div class="ada-container">
    <div class="ada-context-bar" id="adaContextBar">
      <span>ADA</span> — <span id="adaContextText">Kein aktiver Scan</span>
    </div>
    <div class="ada-messages" id="adaMessages">
      <div class="ada-msg assistant">Hallo Nathalie. Was steht an?</div>
    </div>
    <div class="ada-input-row">
      <textarea class="ada-input" id="adaInput" placeholder="Nachricht an ADA…" rows="1"></textarea>
      <button class="ada-send" id="adaSend">Senden</button>
    </div>
  </div>

</div><!-- /.container -->
</div><!-- /.main -->

<!-- ── ANKER BUTTON ──────────────────────────────────────────────────────── -->
<button class="btn-anker" id="btnAnker" title="Anker — Regulierung">Anker</button>

<!-- ── ANKER OVERLAY ─────────────────────────────────────────────────────── -->
<div class="anker-overlay" id="ankerOverlay">
  <div class="anker-card">
    <div id="ankerContent"></div>
    <button class="anker-close" id="btnAnkerClose">Zurück</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════
// SHARED STATE + HELPERS
// ══════════════════════════════════════════════════════════════════════════
let activeTab = "modul1";

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  document.querySelectorAll(".module").forEach(m => m.classList.remove("active"));
  const modId = tab === "modul1" ? "moduleModul1" : tab === "modul2" ? "moduleModul2" : "moduleAda";
  document.getElementById(modId).classList.add("active");

  // Anker visible in cockpit screens
  const showAnker = (tab === "modul1" && document.getElementById("screenCockpit").classList.contains("active"))
    || (tab === "modul2" && currentScan);
  document.getElementById("btnAnker").style.display = showAnker ? "flex" : "none";

  // Update ADA context when switching to ADA
  if (tab === "ada") updateAdaContext();
}

function escHtml(s) { return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

// ══════════════════════════════════════════════════════════════════════════
// MODUL 1 — ERSTGESPRÄCH (original code preserved)
// ══════════════════════════════════════════════════════════════════════════
let PHASES = [];
let ANKER_LINES = [];
let currentConsultation = null;
let currentContact = null;
let currentPhase = 1;
let notesDirty = false;

// Signal Tracker: counts per phase { 1: {L1:0,L2:0,L3:0}, 2: {…}, … }
let signalCounts = { 1: {L1:0,L2:0,L3:0}, 2: {L1:0,L2:0,L3:0}, 3: {L1:0,L2:0,L3:0}, 4: {L1:0,L2:0,L3:0}, 5: {L1:0,L2:0,L3:0} };

function signalTotal(layer) {
  let t = 0; for (let p = 1; p <= 5; p++) t += (signalCounts[p]?.[layer] || 0); return t;
}

function trackSignal(layer) {
  if (!signalCounts[currentPhase]) signalCounts[currentPhase] = {L1:0,L2:0,L3:0};
  signalCounts[currentPhase][layer]++;
  updateSignalButtons();
}

function updateSignalButtons() {
  const pc = signalCounts[currentPhase] || {L1:0,L2:0,L3:0};
  for (const l of ["L1","L2","L3"]) {
    const btn = document.getElementById(`sig${l}`);
    if (!btn) continue;
    const cnt = pc[l];
    const countEl = btn.querySelector(".signal-count");
    if (countEl) { countEl.textContent = cnt; countEl.className = "signal-count" + (cnt === 0 ? " zero" : ""); }
    btn.className = "signal-btn" + (cnt > 0 ? ` ${l.toLowerCase()}-active` : "");
  }
}

function renderSignalTracker() {
  const pc = signalCounts[currentPhase] || {L1:0,L2:0,L3:0};
  return `<div class="signal-tracker">
    <span class="signal-tracker-label">Signal</span>
    <button class="signal-btn${pc.L1 ? ' l1-active' : ''}" id="sigL1" onclick="trackSignal('L1')">L1<span class="signal-count${pc.L1 ? '' : ' zero'}">${pc.L1}</span></button>
    <button class="signal-btn${pc.L2 ? ' l2-active' : ''}" id="sigL2" onclick="trackSignal('L2')">L2<span class="signal-count${pc.L2 ? '' : ' zero'}">${pc.L2}</span></button>
    <button class="signal-btn${pc.L3 ? ' l3-active' : ''}" id="sigL3" onclick="trackSignal('L3')">L3<span class="signal-count${pc.L3 ? '' : ' zero'}">${pc.L3}</span></button>
  </div>`;
}

function renderSignalSummary() {
  const t1 = signalTotal("L1"), t2 = signalTotal("L2"), t3 = signalTotal("L3");
  const max = Math.max(t1, t2, t3, 1);
  return `<div class="signal-summary">
    <div class="signal-summary-title">Signal-Tracker — Zusammenfassung</div>
    <div class="signal-summary-row"><span class="signal-summary-layer l1">L1</span><div class="signal-summary-bar"><div class="signal-summary-fill l1" style="width:${(t1/max)*100}%"></div></div><span class="signal-summary-num">${t1}</span></div>
    <div class="signal-summary-row"><span class="signal-summary-layer l2">L2</span><div class="signal-summary-bar"><div class="signal-summary-fill l2" style="width:${(t2/max)*100}%"></div></div><span class="signal-summary-num">${t2}</span></div>
    <div class="signal-summary-row"><span class="signal-summary-layer l3">L3</span><div class="signal-summary-bar"><div class="signal-summary-fill l3" style="width:${(t3/max)*100}%"></div></div><span class="signal-summary-num">${t3}</span></div>
  </div>`;
}

const $screenStart    = document.getElementById("screenStart");
const $screenCockpit  = document.getElementById("screenCockpit");
const $screenComplete = document.getElementById("screenComplete");
const $contactList    = document.getElementById("contactList");
const $contactName    = document.getElementById("contactName");
const $contactDate    = document.getElementById("contactDate");
const $contactNote    = document.getElementById("contactNote");
const $phaseSidebar   = document.getElementById("phaseSidebar");
const $cockpitContact = document.getElementById("cockpitContact");
const $phaseContent   = document.getElementById("phaseContent");
const $phaseNotes     = document.getElementById("phaseNotes");
const $phaseButtons   = document.getElementById("phaseButtons");
const $btnAnker       = document.getElementById("btnAnker");
const $ankerOverlay   = document.getElementById("ankerOverlay");

function showScreen(id) {
  document.querySelectorAll("#moduleModul1 .screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  $btnAnker.style.display = (id === "screenCockpit" && activeTab === "modul1") ? "flex" : "none";
}

// Logo navigation
document.querySelector(".logo-mark").addEventListener("click", () => {
  if (activeTab === "modul1") {
    showScreen("screenStart");
    loadContacts();
  } else if (activeTab === "modul2") {
    renderScanList();
  }
});

// Version
async function loadVersion() {
  try {
    const r = await fetch("/api/version");
    if (!r.ok) return;
    const d = await r.json();
    const el = document.getElementById("logoSub");
    if (el && d.lastUpdated) el.textContent = `aktualisiert: ${d.lastUpdated}`;
  } catch {}
}

// Contacts
async function loadContacts() {
  try {
    const r = await fetch("/api/contacts");
    const contacts = await r.json();
    renderContacts(contacts);
  } catch {
    $contactList.innerHTML = '<div style="font-size:12px;color:var(--ink-mute);text-align:center;padding:12px;">Kontakte konnten nicht geladen werden.</div>';
  }
}

function renderContacts(contacts) {
  if (!Array.isArray(contacts) || contacts.length === 0) {
    $contactList.innerHTML = '<div style="font-size:12px;color:var(--ink-mute);text-align:center;padding:12px;">Noch keine Kontakte.</div>';
    return;
  }
  $contactList.innerHTML = "";
  for (const c of contacts) {
    const date = new Date(c.created_at).toLocaleDateString("de-CH", { day: "2-digit", month: "2-digit", year: "2-digit" });
    const item = document.createElement("div");
    item.className = "contact-item";

    const nameEl = document.createElement("span");
    nameEl.className = "contact-name";
    nameEl.textContent = c.name;

    const dateEl = document.createElement("span");
    dateEl.className = "contact-date";
    dateEl.textContent = date;

    const editBtn = document.createElement("button");
    editBtn.className = "btn-edit-contact";
    editBtn.title = "Name bearbeiten";
    editBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M7 2l3 3-7 7H0V9z"/><path d="M6 3l3 3"/></svg>';
    editBtn.addEventListener("click", (e) => { e.stopPropagation(); startRenameContact(c, nameEl); });

    const delBtn = document.createElement("button");
    delBtn.className = "btn-del-contact";
    delBtn.title = "Kontakt loeschen";
    delBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M1 3h10M4 3V1.5h4V3M2.5 3l.7 6.5a.8.8 0 00.8.7h4a.8.8 0 00.8-.7L9.5 3"/></svg>';
    delBtn.addEventListener("click", (e) => { e.stopPropagation(); deleteContact(c, item); });

    item.addEventListener("click", () => startSessionForContact(c));
    item.appendChild(nameEl);
    item.appendChild(dateEl);
    item.appendChild(editBtn);
    item.appendChild(delBtn);
    $contactList.appendChild(item);
  }
}

function startRenameContact(contact, nameEl) {
  const oldName = contact.name;
  const input = document.createElement("input");
  input.type = "text"; input.className = "contact-name-edit";
  input.value = oldName; input.maxLength = 200;
  ["click", "mousedown", "dblclick"].forEach(ev => input.addEventListener(ev, (e) => e.stopPropagation()));
  nameEl.replaceWith(input); input.focus(); input.select();
  let done = false;
  const finish = async (save) => {
    if (done) return; done = true;
    const newName = input.value.trim();
    const replacement = document.createElement("span");
    replacement.className = "contact-name";
    replacement.title = "Doppelklick zum Umbenennen";
    replacement.addEventListener("dblclick", (e) => { e.stopPropagation(); startRenameContact(contact, replacement); });
    if (save && newName && newName !== oldName) {
      replacement.textContent = newName; input.replaceWith(replacement); contact.name = newName;
      try { const r = await fetch(`/api/contacts/${contact.id}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name: newName }) }); if (!r.ok) throw new Error("HTTP " + r.status); }
      catch (e) { replacement.textContent = oldName; contact.name = oldName; alert("Umbenennen fehlgeschlagen: " + e.message); }
    } else { replacement.textContent = oldName; input.replaceWith(replacement); }
  };
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); finish(true); } else if (e.key === "Escape") { e.preventDefault(); finish(false); } });
  input.addEventListener("blur", () => finish(true));
}

async function deleteContact(contact, itemEl) {
  if (!confirm(`Kontakt "${contact.name}" wirklich loeschen?\nAlle zugehoerigen Sessions werden ebenfalls geloescht.`)) return;
  try { const r = await fetch(`/api/contacts/${contact.id}`, { method: "DELETE" }); if (!r.ok) throw new Error("HTTP " + r.status); itemEl.remove();
    if ($contactList.children.length === 0) $contactList.innerHTML = '<div style="font-size:12px;color:var(--ink-mute);text-align:center;padding:12px;">Noch keine Kontakte.</div>';
  } catch (e) { alert("Loeschen fehlgeschlagen: " + e.message); }
}

// Start Session
document.getElementById("btnStartSession").addEventListener("click", async () => {
  const name = $contactName.value.trim();
  if (!name) { $contactName.focus(); return; }
  const btn = document.getElementById("btnStartSession");
  btn.disabled = true; btn.textContent = "Starte…";
  try {
    const r = await fetch("/api/contacts", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name, initial_note: $contactNote.value.trim() }) });
    const contact = await r.json(); if (contact.error) throw new Error(contact.error);
    await startSessionForContact(contact);
  } catch (e) { alert("Fehler: " + e.message); }
  btn.disabled = false; btn.textContent = "Gespräch starten";
});

async function startSessionForContact(contact) {
  currentContact = contact;
  const dateVal = $contactDate.value || undefined;
  try {
    const r = await fetch("/api/consultations", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ contact_id: contact.id, consultation_date: dateVal }) });
    const consultation = await r.json(); if (consultation.error) throw new Error(consultation.error);
    currentConsultation = consultation; currentPhase = 1; notesDirty = false;
    signalCounts = { 1: {L1:0,L2:0,L3:0}, 2: {L1:0,L2:0,L3:0}, 3: {L1:0,L2:0,L3:0}, 4: {L1:0,L2:0,L3:0}, 5: {L1:0,L2:0,L3:0} };
    renderCockpitHeader(); renderPhase(currentPhase); showScreen("screenCockpit");
  } catch (e) { alert("Fehler: " + e.message); }
}

function renderCockpitHeader() {
  if (!currentContact) return;
  const dateStr = currentConsultation && currentConsultation.consultation_date
    ? new Date(currentConsultation.consultation_date).toLocaleDateString("de-CH", { day: "2-digit", month: "long", year: "numeric" }) : "";
  $cockpitContact.innerHTML = "";
  const nameEl = document.createElement("span");
  nameEl.className = "cockpit-contact-name"; nameEl.textContent = currentContact.name;
  nameEl.title = "Klick zum Bearbeiten";
  nameEl.addEventListener("click", () => editCockpitName(nameEl));
  const dateEl = document.createElement("span");
  dateEl.className = "cockpit-contact-date"; dateEl.textContent = dateStr ? `— ${dateStr}` : "";
  $cockpitContact.appendChild(nameEl); $cockpitContact.appendChild(dateEl);
}

function editCockpitName(nameEl) {
  const oldName = currentContact.name;
  const input = document.createElement("input");
  input.type = "text"; input.className = "cockpit-contact-name-edit";
  input.value = oldName; input.maxLength = 200;
  nameEl.replaceWith(input); input.focus(); input.select();
  let done = false;
  const finish = async (save) => {
    if (done) return; done = true;
    const newName = input.value.trim();
    const replacement = document.createElement("span");
    replacement.className = "cockpit-contact-name"; replacement.title = "Klick zum Bearbeiten";
    replacement.addEventListener("click", () => editCockpitName(replacement));
    if (save && newName && newName !== oldName) {
      replacement.textContent = newName; input.replaceWith(replacement); currentContact.name = newName; updateNotesLabel();
      try { const r = await fetch(`/api/contacts/${currentContact.id}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name: newName }) }); if (!r.ok) throw new Error("HTTP " + r.status); }
      catch (e) { replacement.textContent = oldName; currentContact.name = oldName; updateNotesLabel(); alert("Umbenennen fehlgeschlagen: " + e.message); }
    } else { replacement.textContent = oldName; input.replaceWith(replacement); }
  };
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); finish(true); } else if (e.key === "Escape") { e.preventDefault(); finish(false); } });
  input.addEventListener("blur", () => finish(true));
}

function updateNotesLabel() {
  const el = document.getElementById("notesLabel");
  if (el && currentContact) el.textContent = `Notizen — ${currentContact.name}`;
}

function renderPhaseSidebar(activeNum) {
  $phaseSidebar.innerHTML = '<div class="phase-sidebar-label">Phasen</div>';
  for (let i = 0; i < PHASES.length; i++) {
    const p = PHASES[i]; const phaseNum = i + 1;
    const isDone = phaseNum < activeNum; const isActive = phaseNum === activeNum;
    const item = document.createElement("button");
    item.className = "phase-nav-item" + (isActive ? " active" : "") + (isDone ? " done" : "");
    const dot = document.createElement("span"); dot.className = "phase-nav-dot";
    dot.textContent = isDone ? "\u2713" : String(phaseNum);
    const title = document.createElement("span"); title.className = "phase-nav-title"; title.textContent = p.title;
    item.appendChild(dot); item.appendChild(title);
    item.addEventListener("click", () => goToPhase(phaseNum));
    $phaseSidebar.appendChild(item);
  }
}

function renderPhase(num) {
  const phase = PHASES[num - 1]; if (!phase) return;
  renderPhaseSidebar(num);
  let html = `<div class="phase-header"><span class="phase-number">${escHtml(phase.num)}</span><span class="phase-title">${escHtml(phase.title)}</span><span class="phase-time">${escHtml(phase.time)}</span></div>`;
  html += `<div class="phase-instruction">${escHtml(phase.instruction)}</div>`;
  html += `<div class="guide-block"><div class="guide-label">Gesprächsleitfaden</div>`;
  for (const g of phase.guide) html += `<div class="guide-item">${g.text}</div>`;
  html += `</div>`;
  html += renderSignalTracker();
  $phaseContent.innerHTML = html;
  updateNotesLabel();
  const noteKey = `phase${num}_notes`;
  $phaseNotes.value = currentConsultation[noteKey] || "";
  notesDirty = false;
  $phaseButtons.innerHTML = "";
  if (num > 1) { const b = document.createElement("button"); b.className = "btn btn-ghost"; b.textContent = "Zurück"; b.addEventListener("click", () => goToPhase(num - 1)); $phaseButtons.appendChild(b); }
  if (num < 5) { const b = document.createElement("button"); b.className = "btn btn-primary"; b.textContent = "Weiter"; b.addEventListener("click", () => goToPhase(num + 1)); $phaseButtons.appendChild(b); }
  else { const b = document.createElement("button"); b.className = "btn btn-primary"; b.textContent = "Gespräch abschliessen"; b.addEventListener("click", finishConsultation); $phaseButtons.appendChild(b); }
  window.scrollTo({ top: 0, behavior: "smooth" });
}

async function goToPhase(num) { await saveCurrentNotes(); currentPhase = num; currentConsultation.current_phase = num; renderPhase(num); }

async function saveCurrentNotes() {
  if (!currentConsultation) return;
  const noteKey = `phase${currentPhase}_notes`; const val = $phaseNotes.value;
  currentConsultation[noteKey] = val;
  try { await fetch(`/api/consultations/${currentConsultation.id}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ [noteKey]: val, current_phase: currentPhase }) }); }
  catch (e) { console.warn("Save failed:", e.message); }
}

async function finishConsultation() {
  await saveCurrentNotes();
  try { await fetch(`/api/consultations/${currentConsultation.id}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ completed: true }) }); } catch {}
  document.getElementById("completeMsg").innerHTML = `Gespräch mit ${escHtml(currentContact.name)} wurde gespeichert.` + renderSignalSummary();
  showScreen("screenComplete");
}

// Content loader
async function loadContent() {
  try {
    const r = await fetch("/api/content"); if (!r.ok) return;
    const d = await r.json();
    if (Array.isArray(d.phases) && d.phases.length > 0) {
      PHASES = d.phases.map(p => ({
        num: p.num, title: p.title, time: p.time, instruction: p.instruction,
        guide: (p.guide || []).map(g => { const formatted = g.replace(/^"([^"]+)"/, '<em>"$1"</em>'); return { text: formatted }; }),
      }));
    }
    if (Array.isArray(d.anker) && d.anker.length > 0) {
      ANKER_LINES = d.anker;
      const $ankerContent = document.getElementById("ankerContent");
      $ankerContent.innerHTML = "";
      for (let i = 0; i < ANKER_LINES.length; i++) {
        const div = document.createElement("div");
        div.className = "anker-line" + (i === ANKER_LINES.length - 1 ? " italic" : "");
        div.textContent = ANKER_LINES[i]; $ankerContent.appendChild(div);
      }
    }
  } catch (e) { console.warn("Content load failed:", e.message); }
}

async function startNewScan() {
  const name = document.getElementById("scanKundeName").value.trim();
  if (!name) { document.getElementById("scanKundeName").focus(); return; }
  try {
    const r = await fetch("/api/scans", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ kunde_name: name }) });
    const scan = await r.json(); if (scan.error) throw new Error(scan.error);
    openScan(scan);
  } catch (e) { alert("Fehler: " + e.message); }
}

// ── AMPEL GRID RENDERER ──
function renderAmpelGrid(phase) {
  let html = '<div class="ampel-grid">';
  for (const [layer, axes] of Object.entries(AMPEL_AXES)) {
    html += `<div class="layer-label">${layer}</div>`;
    for (const achse of axes) {
      const key = `${layer}_${achse}_${phase}`;
      const current = scanAmpeln[key] || "grau";
      html += `<div class="ampel-row"><span class="ampel-label">${escHtml(achse)}</span><div class="ampel-dots">`;
      for (const farbe of ["gruen", "gelb", "rot"]) {
        html += `<div class="ampel-dot ${current === farbe ? farbe : ""}" data-key="${key}" data-farbe="${farbe}" onclick="setAmpel(this)"></div>`;
      }
      html += `</div></div>`;
    }
  }
  html += '</div>';
  return html;
}

function setAmpel(dot) {
  const key = dot.dataset.key;
  const farbe = dot.dataset.farbe;
  scanAmpeln[key] = farbe;
  // Update UI
  dot.parentElement.querySelectorAll(".ampel-dot").forEach(d => {
    d.className = "ampel-dot" + (d.dataset.farbe === farbe ? " " + farbe : "");
  });
  // Recalculate regime if on phase 5
  if (scanPhase === 5) calculateRegime();
}

function calculateRegime() {
  const el = document.getElementById("regimeRouting");
  if (!el) return;

  const getVal = (layer, achse) => scanAmpeln[`${layer}_${achse}_final`] || "grau";
  const l1Vals = AMPEL_AXES.L1.map(a => getVal("L1", a));
  const l2Vals = AMPEL_AXES.L2.map(a => getVal("L2", a));
  const l3Vals = AMPEL_AXES.L3.map(a => getVal("L3", a));

  const hasRot = arr => arr.includes("rot");
  const countRot = arr => arr.filter(v => v === "rot").length;
  const hasGelb = arr => arr.includes("gelb");

  let regime = "";
  if (hasRot(l1Vals)) regime = "Regime 3 — Biologisch zuerst";
  else if (hasGelb(l1Vals) && countRot(l2Vals) >= 2) regime = "Regime 2 — Psychologisch + Biologisch";
  else if (hasRot(l3Vals) && l2Vals[1] === "rot") regime = "Regime 2b — Immunity durchbrechen";
  else if (countRot(l3Vals) >= 2 || (countRot(l3Vals) >= 1 && !hasRot(l1Vals) && !hasRot(l2Vals))) regime = "Regime 1 — Strukturell";
  else regime = "— Noch nicht bestimmbar —";

  el.innerHTML = `<span class="regime-badge">${escHtml(regime)}</span>`;
}

// ── PHASE SAVE HELPERS ──
function bindScanPhaseEvents(num) {
  if (num === 0) {
    const checks = ["mc1", "mc2", "mc3"];
    const updateGate = () => {
      const all = checks.every(id => document.getElementById(id)?.checked);
      const $result = document.getElementById("gateResult");
      const $btns = document.getElementById("scanPhaseButtons");
      if (all) {
        $result.innerHTML = '<div class="gate-result gate-ok">Scan freigegeben ✓</div>';
        $btns.innerHTML = '<button class="btn btn-primary" onclick="savePhase0AndNext()">Weiter zu Phase 1</button>';
      } else {
        let reason = "";
        if (!document.getElementById("mc1").checked) reason = "Kein Budgetmandat vorhanden.";
        else if (!document.getElementById("mc2").checked) reason = "Organisation hat weniger als 5 Personen.";
        else reason = "Akuter Ueberlebensmodus — Scan nicht geeignet.";
        $result.innerHTML = `<div class="gate-result gate-fail">Scan nicht geeignet — ${escHtml(reason)}</div>`;
        $btns.innerHTML = '';
      }
    };
    checks.forEach(id => document.getElementById(id)?.addEventListener("change", updateGate));
    updateGate();
  }
  if (num === 5) calculateRegime();
}

// ── API HELPERS ──
async function patchScan(updates) {
  if (!currentScan) return;
  try { await fetch(`/api/scans/${currentScan.id}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify(updates) }); }
  catch (e) { console.warn("Scan patch failed:", e.message); }
}

async function saveAmpeln(phase) {
  const ampeln = [];
  for (const [layer, axes] of Object.entries(AMPEL_AXES)) {
    for (const achse of axes) {
      const key = `${layer}_${achse}_${phase}`;
      const wert = scanAmpeln[key] || "grau";
      if (wert !== "grau") ampeln.push({ layer, achse, wert, phase });
    }
  }
  if (ampeln.length === 0) return;
  try { await fetch(`/api/scans/${currentScan.id}/ampeln`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ampeln }) }); }
  catch (e) { console.warn("Ampeln save failed:", e.message); }
}

async function ensureInterviewSlots() {
  try {
    const r = await fetch(`/api/scans/${currentScan.id}/interviews`);
    const existing = await r.json();
    scanInterviews = [null, null, null];
    for (const iv of existing) { if (iv.slot_nr >= 1 && iv.slot_nr <= 3) scanInterviews[iv.slot_nr - 1] = iv; }
    for (let i = 1; i <= 3; i++) {
      if (!scanInterviews[i - 1]) {
        const r2 = await fetch(`/api/scans/${currentScan.id}/interviews`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ slot_nr: i }) });
        scanInterviews[i - 1] = await r2.json();
      }
    }
  } catch (e) { console.warn("Interview slots:", e.message); }
}

async function saveAllInterviews() {
  for (let i = 1; i <= 3; i++) {
    const iv = scanInterviews[i - 1];
    if (!iv) continue;
    const remote = document.getElementById(`iv${i}Remote`)?.checked;
    const physisch = document.getElementById(`iv${i}Physisch`)?.checked;
    const updates = {
      rolle: document.getElementById(`iv${i}Rolle`)?.value || "",
      datum: document.getElementById(`iv${i}Datum`)?.value || null,
      audio_typ: remote ? "remote" : physisch ? "physisch" : "",
      primaer_aufnahme: document.getElementById(`iv${i}Primaer`)?.checked || false,
      backup_aufnahme: document.getElementById(`iv${i}Backup`)?.checked || false,
      einwilligung: document.getElementById(`iv${i}Einwilligung`)?.checked || false,
      audio_gesichert: document.getElementById(`iv${i}Audio`)?.checked || false,
      whisper_laeuft: document.getElementById(`iv${i}Whisper`)?.checked || false,
      transkript_vault: document.getElementById(`iv${i}Vault`)?.checked || false,
      notizen: document.getElementById(`iv${i}Notizen`)?.value || "",
      plan_b_aktiv: document.getElementById(`planB${i}`)?.classList.contains("open") || false,
      plan_b_wichtigste_aussage: document.getElementById(`pb${i}Aussage`)?.value || "",
      plan_b_ton_wechsel: document.getElementById(`pb${i}Ton`)?.value || "",
      plan_b_nicht_gesagt: document.getElementById(`pb${i}Nicht`)?.value || "",
      plan_b_layer: document.getElementById(`pb${i}Layer`)?.value || "",
    };
    try { await fetch(`/api/scans/${currentScan.id}/interviews/${iv.id}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify(updates) }); }
    catch (e) { console.warn(`Interview ${i} save:`, e.message); }
    // Bias check
    const bias = {
      biologische_last: document.getElementById(`ob${i}Bio`)?.checked || false,
      systemsprache: document.getElementById(`ob${i}Passiert`)?.checked || false,
      geschuetzte_kollegen: document.getElementById(`ob${i}Geschuetzt`)?.checked || false,
      antrieb_gefragt: document.getElementById(`ob${i}Antrieb`)?.checked || false,
      ton_wechsel: document.getElementById(`ob${i}Ton`)?.checked || false,
    };
    try { await fetch(`/api/scans/${currentScan.id}/interviews/${iv.id}/bias`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(bias) }); }
    catch (e) { console.warn(`Bias ${i} save:`, e.message); }
  }
}

async function loadScanData(scanId) {
  // Load ampeln
  try {
    const r = await fetch(`/api/scans/${scanId}/ampeln`);
    const data = await r.json();
    scanAmpeln = {};
    for (const a of data) scanAmpeln[`${a.layer}_${a.achse}_${a.phase}`] = a.wert;
  } catch {}
  // Load interviews
  await ensureInterviewSlots();
  // Load hypothesen
  try {
    const r = await fetch(`/api/scans/${scanId}/hypothesen`);
    const data = await r.json();
    scanHypothesen = [null, null, null];
    for (const h of data) { if (h.slot_nr >= 1 && h.slot_nr <= 3) scanHypothesen[h.slot_nr - 1] = h; }
  } catch {}
  // Load massnahmen
  try {
    const r = await fetch(`/api/scans/${scanId}/massnahmen`);
    const data = await r.json();
    scanMassnahmen = [null, null, null];
    for (const m of data) { if (m.slot_nr >= 1 && m.slot_nr <= 3) scanMassnahmen[m.slot_nr - 1] = m; }
  } catch {}
}

// ADA — AI CHAT
// ══════════════════════════════════════════════════════════════════════════
let adaMessages = [];
let adaSending = false;

const $adaMessages = document.getElementById("adaMessages");
const $adaInput = document.getElementById("adaInput");
const $adaSend = document.getElementById("adaSend");

function updateAdaContext() {
  const $ctx = document.getElementById("adaContextText");
  if (currentScan) {
    $ctx.textContent = `${currentScan.kunde_name} — Phase ${scanPhase} (${SCAN_PHASES[scanPhase]?.title || "?"})`;
  } else {
    $ctx.textContent = "Kein aktiver Scan";
  }
}

$adaSend.addEventListener("click", sendAdaMessage);
$adaInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendAdaMessage(); }
});

// Auto-resize input
$adaInput.addEventListener("input", () => {
  $adaInput.style.height = "auto";
  $adaInput.style.height = Math.min($adaInput.scrollHeight, 120) + "px";
});

async function sendAdaMessage() {
  const text = $adaInput.value.trim();
  if (!text || adaSending) return;

  adaSending = true;
  $adaSend.disabled = true;

  // Add user message
  adaMessages.push({ role: "user", content: text });
  appendAdaMsg("user", text);
  $adaInput.value = "";
  $adaInput.style.height = "auto";

  // Show thinking
  const thinkEl = document.createElement("div");
  thinkEl.className = "ada-msg thinking";
  thinkEl.textContent = "denkt…";
  $adaMessages.appendChild(thinkEl);
  $adaMessages.scrollTop = $adaMessages.scrollHeight;

  try {
    const scanCtx = currentScan ? {
      kunde: currentScan.kunde_name,
      phase: `Phase ${scanPhase} — ${SCAN_PHASES[scanPhase]?.title || "?"}`,
      status: currentScan.status,
    } : null;

    const r = await fetch("/api/ada/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: adaMessages, scan_context: scanCtx }),
    });
    const data = await r.json();
    thinkEl.remove();

    if (data.error) {
      appendAdaMsg("assistant", "Fehler: " + data.error);
    } else {
      adaMessages.push({ role: "assistant", content: data.content });
      appendAdaMsg("assistant", data.content);
    }
  } catch (e) {
    thinkEl.remove();
    appendAdaMsg("assistant", "Verbindungsfehler: " + e.message);
  }

  adaSending = false;
  $adaSend.disabled = false;
  $adaInput.focus();
}

function appendAdaMsg(role, text) {
  const div = document.createElement("div");
  div.className = `ada-msg ${role}`;
  div.textContent = text;
  $adaMessages.appendChild(div);
  $adaMessages.scrollTop = $adaMessages.scrollHeight;
}
