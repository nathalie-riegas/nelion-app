<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NELION — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #fafafa;
    --surface:    #ffffff;
    --surface2:   #f0f0f0;
    --ink:        #1a1a1a;
    --ink-mid:    #4a4a4a;
    --ink-mute:   #b0b0b0;
    --accent:     #2c2c2c;
    --accent-h:   #444444;
    --border:     rgba(0,0,0,0.08);
    --border2:    rgba(0,0,0,0.15);
    --error:      #c0392b;
    --mono:       'DM Mono', monospace;
    --sans:       'DM Sans', sans-serif;
    --r:          10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 32px 28px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.06);
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 4px;
  }
  .logo-mark {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 12px; font-weight: 500;
    color: #fff; letter-spacing: 0.05em;
  }
  .logo-text {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 0.1em;
  }
  .logo-sub {
    font-size: 11px;
    color: var(--ink-mute);
    font-weight: 300;
  }
  .label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }
  .input-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  input[type="password"] {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--r);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px;
    padding: 11px 14px;
    outline: none;
    transition: border-color .15s, box-shadow .15s, background .15s;
  }
  input[type="password"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
    background: var(--surface);
  }
  button {
    background: var(--accent);
    border: none;
    border-radius: var(--r);
    color: #fff;
    cursor: pointer;
    padding: 11px 18px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    transition: background .15s;
  }
  button:hover { background: var(--accent-h); }
  button:disabled {
    opacity: .35;
    cursor: not-allowed;
  }
  .error {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--error);
    min-height: 14px;
    line-height: 1.4;
  }
</style>
</head>
<body>
  <form class="card" id="loginForm">
    <div class="card-header">
      <div class="logo-mark">N</div>
      <div class="logo-text">NELION</div>
      <span class="logo-sub">Cockpit</span>
    </div>
    <div class="input-row">
      <label class="label" for="password">Passwort</label>
      <input type="password" id="password" autofocus autocomplete="current-password" required>
    </div>
    <button type="submit" id="btnLogin">Entsperren</button>
    <div class="error" id="error"></div>
  </form>
  <script>
    const form = document.getElementById("loginForm");
    const btn = document.getElementById("btnLogin");
    const errorEl = document.getElementById("error");
    const pwEl = document.getElementById("password");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const password = pwEl.value;
      errorEl.textContent = "";
      btn.disabled = true;
      btn.textContent = "Prüfe…";
      try {
        const r = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password }),
        });
        const d = await r.json().catch(() => ({}));
        if (r.ok && d.success) {
          window.location.href = "/";
          return;
        }
        errorEl.textContent = d.error || "Falsches Passwort";
        btn.disabled = false;
        btn.textContent = "Entsperren";
        pwEl.select();
      } catch (err) {
        errorEl.textContent = "Netzwerkfehler: " + err.message;
        btn.disabled = false;
        btn.textContent = "Entsperren";
      }
    });
  </script>
</body>
</html>
